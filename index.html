<!doctype html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>東京櫻花 2026 Pro v7.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <style>
    :root {
      --main-pink: #ffb6c1;
      --bg-pink: #fff5f7;
    }

    body {
      background-color: var(--bg-pink);
      font-family: -apple-system, sans-serif;
      padding-bottom: 100px;
      color: #4a4a4a;
      -webkit-tap-highlight-color: transparent;
    }

    .day-nav {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px 5px;
      scrollbar-width: none;
    }

    .day-nav::-webkit-scrollbar {
      display: none;
    }

    .day-tab {
      flex: 0 0 70px;
      text-align: center;
      padding: 10px;
      border-radius: 15px;
      background: white;
      border: 2px solid transparent;
      transition: 0.3s;
    }

    .day-tab.active {
      border-color: var(--main-pink);
      background: #ffe4e8;
      transform: scale(1.05);
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 16px;
      border-left: 8px solid #ddd;
      box-shadow: 0 4px 12px rgba(255, 182, 193, 0.1);
      margin-bottom: 15px;
      position: relative;
      cursor: grab;
      transition: box-shadow 0.2s, opacity 0.2s;
    }

    .card:active {
      cursor: grabbing;
    }

    .card.dragging {
      opacity: 0.4;
      box-shadow: 0 8px 24px rgba(255, 105, 180, 0.3);
    }

    .card.drag-over {
      box-shadow: 0 0 0 3px #ff69b4;
    }

    .card-spot {
      border-left-color: var(--main-pink);
    }

    .card-restaurant {
      border-left-color: #ff9800;
    }

    .card-transport {
      border-left-color: #9ca3af;
    }

    .budget-badge {
      background: #e0f2f1;
      color: #00796b;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .popup-bg {
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: end;
      position: fixed;
      inset: 0;
      z-index: 1000;
    }

    .popup-bg.active {
      display: flex;
    }

    .popup-content {
      transform: translateY(100%);
      transition: 0.3s cubic-bezier(0.17, 0.84, 0.44, 1);
      background: white;
      width: 100%;
      border-radius: 30px 30px 0 0;
      max-height: 85vh;
      overflow-y: auto;
    }

    .popup-bg.active .popup-content {
      transform: translateY(0);
    }

    .input-style {
      width: 100%;
      background: #f3f4f6;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 0.95rem;
      margin-bottom: 12px;
      outline: none;
    }

    .shop-fab {
      position: fixed;
      bottom: 30px;
      right: 20px;
      width: 60px;
      height: 60px;
      background: #ff69b4;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
      z-index: 900;
    }

    /* view popup type stripe */
    .view-type-stripe {
      width: 6px;
      border-radius: 3px;
      min-height: 50px;
      flex-shrink: 0;
    }
  </style>
</head>

        </button>
      </div>
      <div class="flex gap-3 mb-4">
        <div id="vTypeStripe" class="view-type-stripe"></div>
        <div class="flex-1">
          <div class="flex gap-2 mb-2 flex-wrap">
            <span id="vTime" class="bg-gray-100 text-gray-500 px-3 py-1 rounded-full text-sm font-bold"></span>

      </div>

      <div class="flex gap-3">

            class="fas fa-trash-can mr-1 text-sm"></i>刪除</button>
        <button onclick="closePopups()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold">關閉</button>
      </div>
    </div>
  </div>

  <!-- 編輯/新增彈窗 -->
  <div id="editPopup" class="popup-bg" onclick="closePopups()">
    <div class="popup-content p-6" onclick="event.stopPropagation()">
      <h2 class="text-xl font-bold mb-4" id="editPopupTitle">編輯行程</h2>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-[10px] font-bold text-gray-400">⏰ 時間
            ><input type="text" id="eTime" class="input-style" placeholder="09:00" />
        </div>
        <div>
          <label class="text-[10px] font-bold text-gray-400">💰 預算 (TWD)</label><input type="number" id="eBudget"
            class="input-style" />
        </div>
      </div>
      <label class="text-[10px] font-bold text-gray-400">📍 名稱
        ><input type="text" id="eTitle" class="input-style font-bold" />
        <label class="text-[10px] font-bold text-gray-400">🗺️ 地圖連結
          ><input type="text" id="eMap" class="input-style" />
          <label class="text-[10px] font-bold text-gray-400">🎨 分類</label>
          <select id="eType" class="input-style">
            <option value="spot">🏛️ 景點</option>
            <option value="restaurant">🍴 餐廳</option>
            <option value="transport">🚗 交通</option>
          </select>
          <label class="text-[10px] font-bold text-gray-400">💡 備註
            ><textarea id="ePersonal" class="input-style h-20"></textarea>
            <button onclick="saveChanges()" class="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold"
              id="editSaveBtn">
              更新行程
            </button>
    </div>
  </div>

  <div id="shopPopup" class="popup-bg" onclick="toggleShop()">
    <div class="popup-content p-6 pb-10" onclick="event.stopPropagation()">
      <h2 class="text-xl font-bold mb-4 flex justify-between">
        🛍️ 購物清單
        <span class="text-sm font-normal text-gray-400" onclick="clearBought()">清除已買</span>
      </h2>
      <div class="flex gap-2 mb-4">
        <input type="text" id="newShopItem" class="input-style mb-0" placeholder="想買什麼？" />
        <button onclick="addShopItem()" class="bg-pink-500 text-white px-4 rounded-xl">

        </button>
      </div>
      <div id="shopList" class="space-y-3 max-h-60 overflow-y-auto"></div>
      <button onclick="toggleShop()" class="w-full mt-6 bg-gray-100 py-3 rounded-xl font-bold">
        關閉
      </button>
    </div>
  </div>

      container.innerHTML = `
          <div class="flex justify-between items-end mb-4">
            <h2 class="text-xl font-bold text-gray-700">Day ${day.day} 行程</h2>
            <div class="flex items-center gap-3">
              <div class="text-right">
                <span class="text-[10px] text-gray-400 block">今日預估花費</span>
                <span class="text-lg font-bold text-teal-600">NT$ ${dayTotal.toLocaleString()}</span>
              </div>
              <button onclick="openAdd()" class="bg-pink-500 text-white w-9 h-9 rounded-full flex items-center justify-center shadow-md text-lg font-bold flex-shrink-0" style="box-shadow:0 4px 12px rgba(255,105,180,0.4);">＋</button>
            </div>
          </div>
          <div id="cardList">
          ${day.items
          .map(
            (item, iIdx) => `
            <div class="card card-${item.type}"
              draggable="true"
              data-idx="${iIdx}"
              onclick="openView(${currentDayIdx}, ${iIdx})"
              ondragstart="onDragStart(event, ${iIdx})"
              ondragover="onDragOver(event)"
              ondrop="onDrop(event, ${iIdx})"
              ondragend="onDragEnd(event)"
              ondragleave="onDragLeave(event)"
            >
                <div class="flex justify-between items-start mb-2">
                    <span class="bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full text-[10px] font-bold">${item.time}</span>
                    <div class="flex gap-2">
                        ${item.budget > 0 ? `<span class="budget-badge">NT$ ${item.budget}</span>` : ""}
                        ${item.map ? `<a href="${item.map}" target="_blank" onclick="event.stopPropagation()" class="text-green-500"><i class="fas fa-location-dot"></i></a>` : ""}
                    </div>
                </div>
                <h3 class="text-lg font-bold text-gray-800">${iconMap[item.type]} ${item.title}</h3>
                ${item.personal ? `<p class="text-xs text-blue-500 mt-2 italic bg-blue-50 p-2 rounded-lg"><i class="fas fa-lightbulb mr-1 text-[10px]"></i>${item.personal}</p>` : ""}
            </div>
          `,
          )
          .join("")}
          </div>
        `;

      // 全程總花費
      const grandTotal = tripData.reduce((sum, d) =>
        sum + d.items.reduce((s, item) => s + (Number(item.budget) || 0), 0), 0);
      const maxDay = Math.max(...tripData.map(d =>
        d.items.reduce((s, item) => s + (Number(item.budget) || 0), 0)), 1);
      document.getElementById('totalBanner').innerHTML = `
          <div>
            <div class="text-[10px] text-gray-400 font-bold mb-0.5">✈️ 全程預估總花費</div>
            <div class="text-xl font-bold text-pink-600">NT$ ${grandTotal.toLocaleString()}</div>
          </div>
          <div class="flex gap-1 items-end h-8">
            ${tripData.map((d, idx) => {
        const dt = d.items.reduce((s, item) => s + (Number(item.budget) || 0), 0);
        const h = Math.max(4, Math.round((dt / maxDay) * 28));
        return `<div title="Day${d.day}: NT$${dt.toLocaleString()}" style="width:10px;height:${h}px;border-radius:3px;background:${idx === currentDayIdx ? '#ff69b4' : '#ffb6c1'};opacity:${idx === currentDayIdx ? 1 : 0.5};cursor:pointer" onclick="currentDayIdx=${idx};renderApp()"></div>`;
      }).join('')}
          </div>
        `;

      saveLocal();
    }

    /* ── 拖拉排序 ── */
    function onDragStart(e, idx) {
      dragSrcIdx = idx;
      setTimeout(() => e.target.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    }
    function onDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('drag-over');
      e.dataTransfer.dropEffect = 'move';
    }
    function onDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }
    function onDrop(e, toIdx) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      if (dragSrcIdx === null || dragSrcIdx === toIdx) return;
      const items = tripData[currentDayIdx].items;
      const moved = items.splice(dragSrcIdx, 1)[0];
      items.splice(toIdx, 0, moved);
      dragSrcIdx = null;
      renderApp();
    }
    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
      dragSrcIdx = null;
    }

    /* ── 檢視 ── */
    function openView(d, i) {
      editingIndices = { d, i };
      const item = tripData[d].items[i];
      document.getElementById('vTitle').textContent = item.title;
      document.getElementById('vTime').textContent = '⏰ ' + item.time;
      document.getElementById('vType').textContent = typeLabels[item.type] || item.type;
      document.getElementById('vTypeStripe').style.background = typeColors[item.type] || '#ddd';
      const budgetEl = document.getElementById('vBudget');
      if (item.budget > 0) {
        budgetEl.textContent = 'NT$ ' + item.budget;
        budgetEl.style.display = 'inline';
      } else {
        budgetEl.style.display = 'none';
      }
      const mapEl = document.getElementById('vMapLink');
      if (item.map) {
        mapEl.innerHTML = `<a href="${item.map}" target="_blank" class="text-green-500 text-sm font-bold flex items-center gap-1"><i class="fas fa-location-dot"></i> 開啟地圖</a>`;
      } else {
        mapEl.innerHTML = '';
      }
      const personalEl = document.getElementById('vPersonal');
      if (item.personal) {
        personalEl.textContent = item.personal;
        personalEl.style.display = 'block';
      } else {
        personalEl.style.display = 'none';
      }
      document.getElementById('viewPopup').classList.add('active');
    }

    function openEditFromView() {
      closePopups();
      const { d, i } = editingIndices;
      openEdit(d, i);
    }

    function deleteItem() {
      const { d, i } = editingIndices;
      const title = tripData[d].items[i].title;
      if (!confirm(`確定要刪除「${title}」嗎？`)) return;
      tripData[d].items.splice(i, 1);
      renderApp();
      closePopups();
    }

    /* ── 新增 ── */
    function openAdd() {
      isAddingNew = true;
      document.getElementById('editPopupTitle').textContent = '新增行程';
      document.getElementById('editSaveBtn').textContent = '新增行程';
      document.getElementById('eTime').value = '';
      document.getElementById('eBudget').value = '';
      document.getElementById('eTitle').value = '';
      document.getElementById('eMap').value = '';
      document.getElementById('eType').value = 'spot';
      document.getElementById('ePersonal').value = '';
      document.getElementById('editPopup').classList.add('active');
    }

    /* ── 編輯 ── */
    function openEdit(d, i) {
      isAddingNew = false;
      editingIndices = { d, i };
      const item = tripData[d].items[i];
      document.getElementById('editPopupTitle').textContent = '編輯行程';
      document.getElementById('editSaveBtn').textContent = '更新行程';
      document.getElementById("eTime").value = item.time;
      document.getElementById("eBudget").value = item.budget || 0;
      document.getElementById("eTitle").value = item.title;
      document.getElementById("eMap").value = item.map || "";
      document.getElementById("eType").value = item.type;
      document.getElementById("ePersonal").value = item.personal || "";
      document.getElementById("editPopup").classList.add("active");
    }

    function saveChanges() {
      const time = document.getElementById("eTime").value.trim();
      const title = document.getElementById("eTitle").value.trim();
      if (!title) { alert('請填寫名稱'); return; }
      const newItem = {
        time: time,
        budget: Number(document.getElementById("eBudget").value) || 0,
        title: title,
        map: document.getElementById("eMap").value.trim(),
        type: document.getElementById("eType").value,
        personal: document.getElementById("ePersonal").value,
      };
      if (isAddingNew) {
        tripData[currentDayIdx].items.push(newItem);
      } else {
        const { d, i } = editingIndices;
        tripData[d].items[i] = newItem;
      }
      renderApp();
      closePopups();
    }

    function toggleShop() {
      document.getElementById("shopPopup").classList.toggle("active");
      renderShop();
    }
    function addShopItem() {
      const input = document.getElementById("newShopItem");
      if (input.value) {
        shopList.push({ text: input.value, bought: false });
        input.value = "";
        renderShop();
      }
    }
    function toggleItem(idx) {
      shopList[idx].bought = !shopList[idx].bought;
      renderShop();
    }
    function clearBought() {
      shopList = shopList.filter((i) => !i.bought);
      renderShop();
    }
    function renderShop() {
      const list = document.getElementById("shopList");
      list.innerHTML = shopList
        .map(
          (item, idx) => `
            <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl" onclick="toggleItem(${idx})">
                <i class="fa-regular ${item.bought ? "fa-circle-check text-green-500" : "fa-circle text-gray-300"} text-xl"></i>
                <span class="${item.bought ? "line-through text-gray-400" : "text-gray-700 font-medium"}">${item.text}</span>
            </div>
        `,
        )
        .join("");
      saveLocal();
    }

    function closePopups() {
      document
        .querySelectorAll(".popup-bg")
        .forEach((p) => p.classList.remove("active"));
    }
    function toggleJSON() {
      document.getElementById("jsonInput").value = JSON.stringify(
        { tripData, shopList },
        null,
        2,
      );
      document.getElementById("jsonPopup").classList.toggle("active");
    }
    function importData() {
      try {
        const imported = JSON.parse(
          document.getElementById("jsonInput").value,
        );
        tripData = imported.tripData;
        shopList = imported.shopList || [];
        renderApp();
        closePopups();
      } catch (e) {
        alert("格式錯誤");
      }
    }
    function saveLocal() {
      localStorage.setItem(
        "trip_v7_1_data",
        JSON.stringify({ version: DATA_VERSION, tripData, shopList }),
      );
    }

    // 程式碼裡的 tripData 是「官方預設資料」
    // localStorage 只在版本號相同時才使用（儲存使用者的編輯）
    // 更新 tripData 後，記得同步修改上方的 DATA_VERSION
    window.onload = () => {
      const saved = localStorage.getItem("trip_v7_1_data");
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed.version === DATA_VERSION) {
          // 版本相同：使用 localStorage（保留使用者的編輯）
          tripData = parsed.tripData;
          shopList = parsed.shopList || [];
        } else {
          // 版本不同：使用程式碼裡的新資料，清除舊快取
          shopList = [];
          console.log(`資料已更新：${parsed.version} → ${DATA_VERSION}`);
        }
      }
      renderApp();
    };
  </script>
</body>

</html>
